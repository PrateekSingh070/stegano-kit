name: Feature Request
description: Suggest a new feature or enhancement
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: Have an idea? We'd love to hear it.

  - type: textarea
    id: description
    attributes:
      label: Describe the feature
      placeholder: What would you like to see added?
    validations:
      required: true

  - type: textarea
    id: use-case
    attributes:
      label: Use case
      placeholder: How would you use this feature?
    validations:
      required: false
